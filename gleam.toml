name = "gond"
version = "2.0.4"
description = "🚡 multi-branch conditional expression similar to if - else if - else or cond for Gleam 🚠 (elseif, elsif)"
licences = ["MPL-2.0"]
repository = { type = "github", user = "inoas", repo = "gleam-gond" }

gleam = ">= 1.15.4"

[documentation]
pages = [
  { title = "CHANGELOG", path = "changelog.html", source = "CHANGELOG.md" },
  { title = "LICENSE", path = "license.html", source = "LICENSE" },
]

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.10.0 and < 2.0.0"
